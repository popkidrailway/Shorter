<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>POPKID MD | PAIR CODE</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      /* iOS System Colors */
      --ios-blue: #007AFF;
      --ios-bg: #000000;
      --ios-card: rgba(28, 28, 30, 0.6);
      --ios-text: #FFFFFF;
      --ios-secondary: #8E8E93;
      --glass: saturate(180%) blur(25px);
      --border: rgba(255, 255, 255, 0.12);
      --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
      background-color: var(--ios-bg);
      background-image: 
        radial-gradient(circle at 10% 20%, rgba(0, 122, 255, 0.15) 0%, transparent 30%),
        radial-gradient(circle at 90% 80%, rgba(88, 86, 214, 0.1) 0%, transparent 30%);
      color: var(--ios-text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow-x: hidden;
    }

    /* Particles as subtle bokeh dots */
    .particles {
      position: fixed;
      inset: 0;
      z-index: -1;
    }
    .particle {
      position: absolute;
      border-radius: 50%;
      background: rgba(0, 122, 255, 0.2);
      filter: blur(8px);
      animation: float linear infinite;
    }
    @keyframes float {
      0% { transform: translateY(0) scale(1); opacity: 0; }
      50% { opacity: 0.5; }
      100% { transform: translateY(-100vh) scale(1.2); opacity: 0; }
    }

    /* iOS Style Home Button */
    .home-btn {
      position: fixed;
      top: env(safe-area-inset-top, 20px);
      right: 20px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: var(--glass);
      -webkit-backdrop-filter: var(--glass);
      color: white;
      text-decoration: none;
      font-weight: 500;
      padding: 10px 18px;
      border-radius: 20px;
      border: 0.5px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      z-index: 999;
      transition: var(--transition);
    }
    .home-btn:active { transform: scale(0.94); background: rgba(255, 255, 255, 0.2); }

    .container {
      background: var(--ios-card);
      backdrop-filter: var(--glass);
      -webkit-backdrop-filter: var(--glass);
      border: 0.5px solid var(--border);
      border-radius: 32px;
      padding: 35px 25px;
      width: 100%;
      max-width: 420px;
      text-align: center;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    .logo {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      margin: 0 auto 1.5rem;
      border: 3px solid rgba(255, 255, 255, 0.1);
      background-image: url('https://files.catbox.moe/aapw1p.png');
      background-size: cover;
      background-position: center;
      box-shadow: 0 10px 25px rgba(0, 122, 255, 0.3);
    }

    h1 {
      font-weight: 800;
      font-size: 24px;
      letter-spacing: -1px;
      margin-bottom: 8px;
    }

    p {
      color: var(--ios-secondary);
      font-size: 15px;
      margin-bottom: 24px;
      font-weight: 400;
    }

    .input-group {
      text-align: left;
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-left: 5px;
      margin-bottom: 8px;
      font-size: 13px;
      font-weight: 600;
      color: var(--ios-secondary);
      text-transform: uppercase;
    }

    .input-container {
      position: relative;
    }

    .input-container i {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--ios-blue);
      font-size: 18px;
    }

    input[type=text] {
      width: 100%;
      padding: 18px 18px 18px 52px;
      border: 0.5px solid var(--border);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.05);
      color: white;
      font-size: 17px;
      font-weight: 500;
      transition: var(--transition);
    }

    input:focus {
      outline: none;
      background: rgba(255, 255, 255, 0.1);
      border-color: var(--ios-blue);
    }

    .btn {
      background: var(--ios-blue);
      color: white;
      padding: 16px;
      border: none;
      border-radius: 16px;
      font-weight: 700;
      width: 100%;
      cursor: pointer;
      font-size: 17px;
      transition: var(--transition);
      box-shadow: 0 8px 15px rgba(0, 122, 255, 0.2);
    }

    .btn:active { transform: scale(0.96); opacity: 0.9; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    #result {
      display: none;
      margin-top: 25px;
      padding: 20px;
      border-radius: 20px;
      background: rgba(0, 122, 255, 0.1);
      border: 1px dashed var(--ios-blue);
      animation: fadeIn 0.5s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } }

    #pair-code {
      font-family: "Monaco", monospace;
      font-size: 32px;
      font-weight: 800;
      margin: 15px 0;
      color: white;
      letter-spacing: 4px;
      text-shadow: 0 0 15px rgba(0, 122, 255, 0.5);
    }

    .action-buttons {
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }

    .action-btn {
      flex: 1;
      padding: 14px;
      border-radius: 12px;
      font-weight: 600;
      cursor: pointer;
      font-size: 14px;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: var(--transition);
    }

    .copy-btn { background: white; color: black; border: none; }
    .copy-btn:active { transform: scale(0.95); }
    .back-btn { background: rgba(255,255,255,0.08); border: 0.5px solid var(--border); color: white; }

    .error-message { color: #FF453A; font-size: 13px; margin-top: 8px; display: none; font-weight: 500; }
    .success-message { color: #32D74B; font-size: 14px; margin-top: 10px; display: none; font-weight: 600; }

    .spinner-ios {
      font-size: 24px;
      color: var(--ios-blue);
      display: none;
      margin: 15px auto;
    }

    @media (max-width: 480px) {
      .container { padding: 30px 20px; border-radius: 28px; }
      h1 { font-size: 22px; }
    }
  </style>
</head>
<body>
  <div class="particles" id="particles"></div>

  <a href="./" class="home-btn"><i class="fas fa-chevron-left"></i> Back</a>

  <div class="container">
    <div class="logo"></div>
    <h1>Pair Code</h1>
    <p>Link your WhatsApp via phone number</p>

    <div class="input-group">
      <label for="phone-number">Phone Number</label>
      <div class="input-container">
        <i class="fas fa-phone-alt"></i>
        <input type="text" id="phone-number" placeholder="2547xxxxxxxx" inputmode="numeric" />
      </div>
      <div id="error-message" class="error-message">Enter a valid number (10–15 digits)</div>
    </div>

    <button id="submit" class="btn">
      <span id="btn-text">Get Code</span>
      <span id="btn-spinner" style="display:none;"><i class="fas fa-circle-notch fa-spin"></i></span>
    </button>

    <div id="loading-spinner" class="spinner-ios"><i class="fas fa-spinner fa-spin"></i></div>

    <div id="result">
      <p style="margin-bottom:5px; font-size: 13px; text-transform: uppercase; letter-spacing: 1px;">Success</p>
      <div id="pair-code"></div>
      
      <div class="action-buttons">
        <button id="copy-btn" class="action-btn copy-btn"><i class="fas fa-copy"></i> Copy</button>
        <a href="./" class="action-btn back-btn">Done</a>
      </div>

      <div id="success-message" class="success-message">
        <i class="fas fa-check-circle"></i> Copied to clipboard
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.0.0-alpha.1/axios.min.js"></script>
  <script>
    // Subtle iOS bokeh background
    (function createParticles(){
      const particles = document.getElementById('particles');
      const count = 15;
      for(let i=0;i<count;i++){
        const p = document.createElement('div');
        p.classList.add('particle');
        const size = Math.random()*20+10;
        p.style.width = p.style.height = size+'px';
        p.style.left = Math.random()*100+'%';
        p.style.top = Math.random()*100+'%';
        p.style.animationDuration = (Math.random()*10+10)+'s';
        p.style.animationDelay = (Math.random()*5)+'s';
        particles.appendChild(p);
      }
    })();

    // MAINTAINING YOUR ORIGINAL SCRIPT LOGIC
    const phoneNumberInput=document.getElementById("phone-number");
    const submitBtn=document.getElementById("submit");
    const resultDiv=document.getElementById("result");
    const pairCodeDiv=document.getElementById("pair-code");
    const copyBtn=document.getElementById("copy-btn");
    const errorMsg=document.getElementById("error-message");
    const successMsg=document.getElementById("success-message");
    const btnText=document.getElementById("btn-text");
    const btnSpin=document.getElementById("btn-spinner");

    function validNum(num){const clean=num.replace(/\D/g,'');return clean.length>=10&&clean.length<=15;}

    submitBtn.addEventListener("click", async (e)=>{
      e.preventDefault();
      const num=phoneNumberInput.value.trim();
      if(!validNum(num)){
        errorMsg.style.display="block";
        return;
      }
      errorMsg.style.display="none";
      btnText.style.display="none"; btnSpin.style.display="inline-block"; submitBtn.disabled=true;
      
      try {
        const {data}=await axios.get(`/code?number=${num}`);
        const code=data.code||"ERROR";
        pairCodeDiv.textContent=code;
        resultDiv.style.display="block";
      } catch(err) {
        pairCodeDiv.textContent="ERROR";
        resultDiv.style.display="block";
      } finally {
        btnText.style.display="inline-block"; btnSpin.style.display="none"; submitBtn.disabled=false;
      }
    });

    copyBtn.addEventListener("click",()=>{
      const code=pairCodeDiv.textContent;
      navigator.clipboard.writeText(code).then(()=>{
        successMsg.style.display="block";
        setTimeout(()=>successMsg.style.display="none",2000);
      });
    });

    phoneNumberInput.addEventListener("input",(e)=>{
      e.target.value=e.target.value.replace(/\D/g,'');
      if(errorMsg.style.display==="block"){errorMsg.style.display="none";}
    });
  </script>
</body>
</html>
